name: Tessl PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: tessl-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run on PR events, or on /tessl-review comment from collaborators
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.body == '/tessl-review' &&
       github.event.issue.pull_request != null &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch --no-tags origin main

      - name: Install Tessl CLI
        uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Install Tessl dependencies
        run: tessl install

      - name: Review PR
        id: review
        run: |
          tessl change review \
            --skill tessl/code-review#review-code-legibility \
            --base origin/main \
            --json --output review-results.json

      - name: Publish review
        if: always() && steps.review.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('review-results.json', 'utf8'));

            const body = [
              '## Tessl Code Review',
              '',
              results.summary.overview,
              '',
              results.comments.length > 0
                ? `Found **${results.comments.length}** inline comment(s).`
                : '✅ No issues found.',
            ].join('\n');

            const comments = results.comments.map(c => ({
              path: c.path,
              line: c.line,
              side: c.side || 'RIGHT',
              body: c.body,
            }));

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request?.number || context.payload.issue?.number,
              event: 'COMMENT',
              body,
              comments,
            });
